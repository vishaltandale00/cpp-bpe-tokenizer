name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python fixture dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install tiktoken

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBPE_BUILD_BENCHMARKS=OFF

      - name: Generate reference fixtures
        run: python scripts/gen_fixtures.py

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Consumer smoke
        run: |
          cmake -S tests/cmake/consumer -B build-consumer -DBPE_SOURCE_DIR="$PWD"
          cmake --build build-consumer --parallel
          ./build-consumer/bpe_consumer_smoke
